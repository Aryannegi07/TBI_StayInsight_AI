services:
  - type: web
    name: stayinsight-ai-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PORT
        value: 5000
      # Secrets below are NOT set here on purpose — add real values in the
      # Render dashboard (Environment tab) instead of committing them.
      # See backend/.env.example for the full list and description of each.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: GEMINI_TIMEOUT_MS
        value: 15000
      - key: GEMINI_MAX_RETRIES
        value: 2
